<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/style/style.css">
</head>

<body>
    <header>
        <nav>
            <h1 class="DE-TRAIN">DE-TRAIN</h1>
            <img id="icon" src="../assets/imgs/icon.png">
            <h1><a class="EntrarText" href="../public/home.html">VOLTAR</a></h1>
            <img id="LoginIcon" src="../assets/imgs/VoltarIcon.png">
        </nav>

<div id="BlocoCadastro">

        <div class="Cadastro">

            <h2>Cadastro</h2>

            <form id="FormsCadastro">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Insira seu nome">
                <br>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Insira seu email">
                <br>

                <label for="ddd">DDD:</label>
                <input type="text" maxlength="2" id="ddd" placeholder="DDD">
               
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="Insira seu Telefone">
                <br>

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Insira sua senha">
                <br>

                <button class="ButtonCadastro">CADASTRAR FUNCIONÁRIO</button>


            </form>

        </div>

</div>

    </header>
</body>

</html>

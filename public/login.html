<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../assets/style/style.css">
</head>

<body>
    <header>
        <nav>
            <h1 class="DE-TRAIN">DE-TRAIN</h1>
            <img id="icon" src="../assets/imgs/icon.png">
        </nav>
    </header>

    <main>
        <div class="flex">
            <div class="blocoLogin">
                <div>

                    <h2 id="loginTitulo">BEM VINDO!</h2>

                    <form id="FormsLogin">
                        <label for="nome">EMAIL</label>
                        <input type="text" id="nome" class="loginInput" placeholder="Insira seu email">
                        <br>

                        <label for="email">SENHA:</label>
                        <input type="email" id="email" class="loginInput" placeholder="Insira sua senha">
                        <br>

                        <button class="ButtonCadastro">Entrar</button>

                    </form>

                </div>


            </div>


            <div class="ImageLogin">
                <img src="../assets/imgs/LoginImage.png" alt="">
            </div>
        </div>


    </main>




</body>

</html>
